apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  labels:
    app.kubernetes.io/managed-by: crossplane
    platform.rezakara.demo/tenant: payment
  name: gitops-payment
  namespace: argocd
spec:
  destination:
    name: in-cluster
    namespace: gitops-payment
  project: default
  source:
    path: charts/gitops-tenant
    repoURL: kubepave
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: applications.azuread.m.upbound.io/v1beta1
kind: AppRole
metadata:
  labels:
    prefix: wl
    role: admin
    tenant: payment
  name: payment-wl-admin
  namespace: crossplane
spec:
  forProvider:
    allowedMemberTypes:
    - User
    - Group
    applicationId: ""
    description: admin access for payment wl
    displayName: payment-wl-admin
    value: payment-wl-admin
  providerConfigRef:
    name: azuread
---
apiVersion: groups.azuread.m.upbound.io/v1beta1
kind: Group
metadata:
  labels:
    prefix: wl
    role: admin
    tenant: payment
  name: payment-wl-admins
  namespace: crossplane
spec:
  forProvider:
    displayName: payment-wl-admins
    securityEnabled: true
  providerConfigRef:
    name: azuread
---
apiVersion: app.azuread.m.upbound.io/v1beta1
kind: RoleAssignment
metadata:
  name: payment-wl-admin
  namespace: crossplane
spec:
  forProvider:
    appRoleIdSelector:
      matchLabels:
        prefix: wl
        role: admin
        tenant: payment
    principalObjectIdSelector:
      matchLabels:
        prefix: wl
        role: admin
        tenant: payment
    resourceObjectId: ""
  providerConfigRef:
    name: azuread
---
apiVersion: applications.azuread.m.upbound.io/v1beta1
kind: AppRole
metadata:
  labels:
    prefix: wl
    role: viewer
    tenant: payment
  name: payment-wl-viewer
  namespace: crossplane
spec:
  forProvider:
    allowedMemberTypes:
    - User
    - Group
    applicationId: ""
    description: viewer access for payment wl
    displayName: payment-wl-viewer
    value: payment-wl-viewer
  providerConfigRef:
    name: azuread
---
apiVersion: groups.azuread.m.upbound.io/v1beta1
kind: Group
metadata:
  labels:
    prefix: wl
    role: viewer
    tenant: payment
  name: payment-wl-viewers
  namespace: crossplane
spec:
  forProvider:
    displayName: payment-wl-viewers
    securityEnabled: true
  providerConfigRef:
    name: azuread
---
apiVersion: app.azuread.m.upbound.io/v1beta1
kind: RoleAssignment
metadata:
  name: payment-wl-viewer
  namespace: crossplane
spec:
  forProvider:
    appRoleIdSelector:
      matchLabels:
        prefix: wl
        role: viewer
        tenant: payment
    principalObjectIdSelector:
      matchLabels:
        prefix: wl
        role: viewer
        tenant: payment
    resourceObjectId: ""
  providerConfigRef:
    name: azuread
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  labels:
    app.kubernetes.io/managed-by: crossplane
    platform.rezakara.demo/prefix: wl
    platform.rezakara.demo/tenant: payment
  name: baseline-payment-wl
  namespace: argocd
spec:
  destination:
    name: minikube-workload
    namespace: payment
  project: default
  source:
    path: charts/baseline-tenant
    repoURL: kubepave
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
