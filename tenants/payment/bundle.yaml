apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  labels:
    app.kubernetes.io/managed-by: crossplane
    platform.rezakara.demo/tenant: payment
  name: gitops-payment
  namespace: argocd
spec:
  destination:
    name: in-cluster
    namespace: gitops-payment
  project: default
  source:
    helm:
      values: |
        tenant:
          argocd:
            syncRepos:
            - https://github.com/rezakaramad/kubepave.git
          dnsName: pay
          name: payment
          owner:
            email: ""
            team: payment
          rbac:
            roles:
            - entraId:
                appRoleUUIDs:
                  wl: cf7ba269-9305-5cbd-85e5-e4f802b36025
                assignment:
                  PrincipalObjectIds: null
                  SelectorEnabled: false
              name: admin
              policies:
              - Actions:
                - get
                - update
                - delete
                - sync
                - action/apps/Deployment/pause
                - action/apps/Deployment/resume
                - action/apps/Deployment/restart
                - action/batch/CronJob/create-job
                Resource: applications
              - Actions:
                - get
                Resource: logs
            - entraId:
                appRoleUUIDs:
                  wl: 463d4095-7fb2-5f96-863e-4f7ec46c088d
                assignment:
                  PrincipalObjectIds: null
                  SelectorEnabled: false
              name: viewer
              policies:
              - Actions:
                - get
                Resource: applications
              - Actions:
                - get
                Resource: logs
    path: charts/gitops-tenant
    repoURL: https://github.com/rezakaramad/kubepave.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  labels:
    app.kubernetes.io/managed-by: crossplane
    platform.rezakara.demo/prefix: wl
    platform.rezakara.demo/tenant: payment
  name: baseline-payment-wl
  namespace: argocd
spec:
  destination:
    name: minikube-workload
    namespace: payment
  project: default
  source:
    helm:
      values: |
        environmentPrefix: wl
        tenant:
          dnsName: pay
          name: payment
          owner:
            email: ""
            team: payment
    path: charts/baseline-tenant
    repoURL: https://github.com/rezakaramad/kubepave.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
